name: test
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t plmuggintest .
      - run: docker run -p 5432:5432 -e POSTGRES_USER=test -e POSTGRES_HOST_AUTH_METHOD=trust -e POSTGRES_DB=test
      - run: psql -h localhost -p 5432 -u test -f mugshot/test/test.sql
      - run: ./mugshot/test/start.sh
      - run: curl "http://localhost:3000/add?a=42000&b=69"
